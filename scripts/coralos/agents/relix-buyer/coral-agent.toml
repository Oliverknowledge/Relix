edition = 4

[agent]
name = "relix-buyer"
version = "0.1.0"
description = "Relix Growth Employee, the buyer agent that posts launch jobs and awards bids in the CoralOS market."
summary = "Relix buyer agent"
readme = "Relix Growth Employee buyer agent. Posts a launch job to the CoralOS market, collects specialist bids, and records the result for the app to award and settle in Anchor escrow."

[agent.license]
type = "text"
text = "Proprietary — Relix hackathon MVP."

# Edit path/arguments for your machine: `path` = your node binary, first
# argument = absolute path to scripts/coralos/dist/agent.mjs, --data-dir =
# absolute path to this repo's data/ folder.
[runtimes.executable]
transport = "sse"
path = "/usr/local/bin/node"
arguments = [
  "/ABSOLUTE/PATH/TO/Relix/scripts/coralos/dist/agent.mjs",
  "buyer",
  "--data-dir=/ABSOLUTE/PATH/TO/Relix/data"
]
